name: Indexer deploy
on:
  push:
    branches:
      - master
    paths: ["indexer/**", "fly.indexer.toml", "contracts/deployments/**"]
  workflow_dispatch:
env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_KEY }}
concurrency:
  group: indexer-deploy
  cancel-in-progress: false
jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.indexer.toml --remote-only
