name: Contracts Deploy

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Target network'
        required: true
        default: 'sepolia'
        type: choice
        options:
          - sepolia

concurrency:
  group: deploy-${{ github.event.inputs.network }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: contracts/package-lock.json

      - run: npm ci

      - name: Deploy to Sepolia
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          SEPOLIA_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: echo "y" | npm run deploy:sepolia

      - name: Show deployment addresses
        run: cat ignition/deployments/chain-11155111/deployed_addresses.json || echo "No deployment found"

      - name: Record deployment
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: npx tsx scripts/record-deployment.ts ${{ github.event.inputs.network }}

      - uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ github.run_id }}
          path: contracts/ignition/deployments/
          retention-days: 90

      - name: Commit deployment record
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contracts/deployments/${{ github.event.inputs.network }}.json contracts/deployments/abis/
          git diff --cached --quiet && exit 0
          git commit -m "Record factory deployment to ${{ github.event.inputs.network }}"
          git pull --rebase
          git push
