services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pinky_swear
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: frontend
    ports:
      - "3000:80"

  indexer:
    build:
      context: .
      dockerfile: indexer/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pinky_swear
      RPC_HTTPS_URL: ${RPC_HTTPS_URL}
      RPC_WS_URL: ${RPC_WS_URL}
      NETWORK: ${NETWORK}

volumes:
  pgdata:
